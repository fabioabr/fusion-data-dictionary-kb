<script>
/* ====== i18n ====== */
var _urlLang = new URLSearchParams(window.location.search).get('lang');
var currentLang = _urlLang || localStorage.getItem('preferred-lang') || 'pt';

var _i18nMap = {};
(DATA.i18n || []).forEach(function(item) {
    if (item.br) {
        _i18nMap[item.br] = { en: item.en, es: item.es };
        _i18nMap[item.br.toLowerCase()] = { en: item.en, es: item.es };
    }
});

function _lookup(text) {
    if (!text || currentLang === 'pt') return null;
    var clean = text.replace(/<[^>]+>/g, '').trim();
    var found = _i18nMap[clean] || _i18nMap[clean.toLowerCase()];
    if (found && found[currentLang]) return found[currentLang];
    var bestKey = null;
    var bestLen = 0;
    for (var key in _i18nMap) {
        if (key.length > bestLen && clean.indexOf(key) >= 0 && _i18nMap[key][currentLang]) {
            if (key.length > clean.length * 0.6) {
                bestKey = key;
                bestLen = key.length;
            }
        }
    }
    if (bestKey) return _i18nMap[bestKey][currentLang];
    return null;
}

function t(obj) {
    if (!obj) return '';
    if (typeof obj === 'object' && obj !== null && !Array.isArray(obj)) {
        if (obj[currentLang]) return obj[currentLang];
        var ptVal = obj['pt'] || obj['en'] || '';
        if (currentLang === 'pt') return ptVal;
        var translated = _lookup(ptVal);
        if (translated) return translated;
        return _multiReplace(ptVal);
    }
    if (typeof obj === 'string') {
        if (currentLang === 'pt') return obj;
        var translated = _lookup(obj);
        if (translated) return translated;
        return _multiReplace(obj);
    }
    return String(obj);
}

function _multiReplace(text) {
    if (!text || currentLang === 'pt') return text;
    var clean = text.replace(/<[^>]+>/g, '');
    var result = text;
    var keys = Object.keys(_i18nMap).filter(function(k) {
        return k.length > 5 && _i18nMap[k][currentLang] && clean.indexOf(k) >= 0;
    }).sort(function(a, b) { return b.length - a.length; });
    if (keys.length === 0) return text;
    var working = clean;
    keys.forEach(function(key) {
        var translated = _i18nMap[key][currentLang];
        if (translated && working.indexOf(key) >= 0) {
            working = working.replace(key, translated);
        }
    });
    if (working !== clean) return working;
    return text;
}

function tList(arr) {
    if (!arr) return [];
    if (!Array.isArray(arr) && typeof arr === 'object') {
        var ptList = arr['pt'] || [];
        if (currentLang === 'pt') return ptList;
        return ptList.map(function(item) { return t(item); });
    }
    return arr.map(function(item) { return t(item); });
}

function switchLang(lang) {
    var activeTab = document.querySelector('.tab-btn.active');
    var activeTabId = activeTab ? activeTab.getAttribute('data-tab') : null;
    currentLang = lang;
    localStorage.setItem('preferred-lang', lang);
    document.querySelectorAll('.lang-btn').forEach(function(b) { b.classList.remove('active'); });
    var btn = document.getElementById('lang-' + lang);
    if (btn) btn.classList.add('active');
    render();
    if (activeTabId) switchTab(activeTabId);
}

/* ====== THEME ====== */
function toggleTheme() {
    var current = document.body.getAttribute('data-theme');
    document.body.setAttribute('data-theme', current === 'light' ? '' : 'light');
    document.getElementById('theme-icon').className = current === 'light' ? 'ri-sun-line' : 'ri-moon-line';
    localStorage.setItem('theme', document.body.getAttribute('data-theme') || 'dark');
}

/* ====== TABS ====== */
function switchTab(id) {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
    document.querySelectorAll('.tab-btn').forEach(function(b) {
        if (b.getAttribute('data-tab') === id) b.classList.add('active');
    });
    var el = document.getElementById('tab-' + id);
    if (el) el.classList.add('active');
}

/* ====== LINK RESOLVER ====== */
function resolveTableLink(tableName, currentModule) {
    if (!DATA.table_map) return { href: '#', cls: 'broken-link', title: 'Link not resolved' };
    var upper = tableName.toUpperCase();
    var targetModule = DATA.table_map[upper];
    if (!targetModule) return { href: '#', cls: 'broken-link', title: 'Link not resolved' };
    if (targetModule === currentModule) {
        return { href: '../tables/' + tableName.toLowerCase() + '.html', cls: 'wikilink' };
    }
    return { href: '../../' + targetModule + '/tables/' + tableName.toLowerCase() + '.html', cls: 'wikilink' };
}

function langParam() {
    return currentLang !== 'pt' ? '?lang=' + currentLang : '';
}

function tableLinkHtml(tableName) {
    var mod = DATA.meta.module_code || '';
    var r = resolveTableLink(tableName, mod);
    if (r.cls === 'broken-link') {
        return '<span class="broken-link" title="' + (r.title || '') + '">' + tableName + '</span>';
    }
    return '<a href="' + r.href + langParam() + '" class="wikilink">' + tableName + '</a>';
}

/* ====== COLLAPSIBLE TOGGLE ====== */
function toggleCard(cardId) {
    var body = document.getElementById('card-body-' + cardId);
    var icon = document.getElementById('collapse-icon-' + cardId);
    if (body && icon) {
        body.classList.toggle('collapsed');
        icon.classList.toggle('collapsed');
    }
}

/* ====== CHECK ICON ====== */
function checkIcon(val) {
    if (val) return '<i class="ri-checkbox-circle-fill" style="color:var(--success);font-size:1.1rem"></i>';
    return '';
}

/* ====== TABLE COLOR MAP ====== */
var _tableColors = {};
var _colorPalette = [
    {bg: 'rgba(91,164,217,0.15)', border: 'rgba(91,164,217,0.4)', text: 'var(--primary)'},
    {bg: 'rgba(106,191,59,0.15)', border: 'rgba(106,191,59,0.4)', text: 'var(--success)'},
    {bg: 'rgba(155,150,255,0.15)', border: 'rgba(155,150,255,0.4)', text: 'var(--purple)'},
    {bg: 'rgba(244,172,0,0.15)', border: 'rgba(244,172,0,0.4)', text: 'var(--warning)'},
    {bg: 'rgba(56,189,248,0.15)', border: 'rgba(56,189,248,0.4)', text: 'var(--info)'},
    {bg: 'rgba(255,148,115,0.15)', border: 'rgba(255,148,115,0.4)', text: 'var(--orange)'},
    {bg: 'rgba(45,212,191,0.15)', border: 'rgba(45,212,191,0.4)', text: 'var(--teal)'},
    {bg: 'rgba(91,184,196,0.15)', border: 'rgba(91,184,196,0.4)', text: 'var(--secondary)'},
    {bg: 'rgba(232,93,84,0.15)', border: 'rgba(232,93,84,0.4)', text: 'var(--danger)'},
];
function getTableColor(tableName) {
    if (!_tableColors[tableName]) {
        var idx = Object.keys(_tableColors).length % _colorPalette.length;
        _tableColors[tableName] = _colorPalette[idx];
    }
    return _tableColors[tableName];
}
function tableColorText(tableName, isLink) {
    var c = getTableColor(tableName);
    if (isLink) {
        var r = resolveTableLink(tableName, (DATA.meta && DATA.meta.module_code) || '');
        if (r.cls === 'wikilink') {
            return '<a href="' + r.href + langParam() + '" style="color:' + c.text + ';text-decoration:none;font-family:\'Courier New\',monospace;font-size:0.78rem;font-weight:600;border-bottom:1px dotted ' + c.text + '" title="' + tableName + '">' + tableName + '</a>';
        }
    }
    return '<span style="color:' + c.text + ';font-family:\'Courier New\',monospace;font-size:0.78rem;font-weight:600">' + tableName + '</span>';
}
function columnBadge(columnName, tableName) {
    var c = getTableColor(tableName);
    var style = 'display:inline-block;padding:2px 10px;border-radius:10px;font-size:0.7rem;font-family:\'Courier New\',monospace;font-weight:500;background:' + c.bg + ';color:' + c.text + ';border:1px solid ' + c.border;
    return '<span style="' + style + '">' + columnName + '</span>';
}

/* ====== RENDER ====== */
function render() {
    var d = DATA;
    var m = d.meta;
    // Reset table colors on re-render
    _tableColors = {};

    document.getElementById('h-title').textContent = m.pvo_name;

        '<div class="header-badge"><i class="ri-pie-chart-line"></i> BICC ' + d.stats.bicc_pct + '%</div>';

    // Tabs
    var tabLabels = {

    document.getElementById('tabs-nav').innerHTML =

        '<button class="tab-btn" data-tab="bytable" onclick="switchTab(\'bytable\')"><i class="ri-stack-line"></i> ' + t(tabLabels.bytable) + ' <span class="tab-count">' + d.stats.tables_count + '</span></button>';

    // ========== Tab 1: Overview ==========
    var statsHtml =
        '<div class="stats-grid">' +
        '<div class="stat-card"><div class="stat-card-icon bg-primary"><i class="ri-list-check"></i></div><div class="stat-card-info"><div class="stat-card-number" style="color:var(--primary)">' + d.stats.total_attributes + '</div><div class="stat-card-label">' + t({pt:'Total Atributos', en:'Total Attributes', es:'Total Atributos'}) + '</div></div></div>' +
        '<div class="stat-card"><div class="stat-card-icon bg-info"><i class="ri-database-2-line"></i></div><div class="stat-card-info"><div class="stat-card-number" style="color:var(--info)">' + d.stats.tables_count + '</div><div class="stat-card-label">' + t({pt:'Tabelas', en:'Tables', es:'Tablas'}) + '</div></div></div>' +
        '<div class="stat-card"><div class="stat-card-icon bg-success"><i class="ri-checkbox-circle-line"></i></div><div class="stat-card-info"><div class="stat-card-number" style="color:var(--success)">' + d.stats.bicc_enabled + ' <span style="font-size:0.75rem;font-weight:400;color:var(--text-muted)">(' + d.stats.bicc_pct + '%)</span></div><div class="stat-card-label">BICC Enabled</div></div></div>' +
        '<div class="stat-card"><div class="stat-card-icon bg-warning"><i class="ri-key-line"></i></div><div class="stat-card-info"><div class="stat-card-number" style="color:var(--warning)">' + d.stats.pk_count + '</div><div class="stat-card-label">Primary Keys</div></div></div>' +
        '</div>';

    var descText = t(m.description || '');
    var introHtml = '<div class="intro-text">' +
        '<p style="margin-bottom:10px">' + descText + '</p>' +
        '<p style="font-size:0.78rem;color:var(--text-muted)"><i class="ri-flow-chart" style="margin-right:6px"></i> <strong>PVO path:</strong> <code style="font-size:0.72rem">' + (m.full_path || m.pvo_name) + '</code></p>' +
        '</div>';

    // Tables base card
    var tablesCardHtml = '';
    if (d.tables && d.tables.length) {
        tablesCardHtml = '<div class="card"><div class="card-header"><div class="card-header-icon bg-info"><i class="ri-database-2-line"></i></div><div class="card-title">' + t({pt:'Tabelas Base', en:'Base Tables', es:'Tablas Base'}) + '</div><div class="card-badge pill-info">' + d.tables.length + '</div></div><div class="card-body">';
        d.tables.forEach(function(tbl) {

    // References card
    var refsHtml = '<div class="card"><div class="card-header"><div class="card-header-icon bg-purple"><i class="ri-links-line"></i></div><div class="card-title">' + t({pt:'Referências', en:'References', es:'Referencias'}) + '</div></div><div class="card-body">';

    // BICC Mapping source
    refsHtml += '<div style="margin-bottom:10px;font-size:0.82rem"><i class="ri-file-excel-2-line" style="color:var(--success);margin-right:6px"></i> ';
    refsHtml += '<strong>BICC Database Mapping</strong> — Oracle Fusion Cloud Release 13/25A';
    refsHtml += '</div>';

    // Oracle OEDMF docs
    var oedmfBase = 'https://docs.oracle.com/en/cloud/saas/';
    var modPath = (m.module_code === 'HCM') ? 'human-resources' : 'financials';
    var oedmfUrl = oedmfBase + modPath + '/25a/oedmf/';
    refsHtml += '<div style="margin-bottom:10px;font-size:0.82rem"><i class="ri-book-open-line" style="color:var(--info);margin-right:6px"></i> ';
    refsHtml += '<a href="' + oedmfUrl + '" target="_blank" style="color:var(--info);text-decoration:none;border-bottom:1px dotted var(--info)">Oracle Enterprise Data Management Framework (OEDMF) — Release 25A</a>';

    // Link to main table
    if (d.tables && d.tables.length > 0) {

        refsHtml += '<div style="margin-bottom:10px;font-size:0.82rem"><i class="ri-table-2" style="color:var(--primary);margin-right:6px"></i> ';
        refsHtml += t({pt:'Tabela principal: ', en:'Main table: ', es:'Tabla principal: '});
        if (mainLink.cls === 'wikilink') {
            refsHtml += '<a href="' + mainLink.href + langParam() + '" style="color:var(--primary);text-decoration:none;border-bottom:1px dotted var(--primary);font-family:\'Courier New\',monospace;font-size:0.78rem">' + mainTable + '</a>';
        } else {
            refsHtml += '<span style="font-family:\'Courier New\',monospace;font-size:0.78rem">' + mainTable + '</span>';
        }
        refsHtml += '</div>';
    }

    // PVO full path
    refsHtml += '<div style="font-size:0.82rem"><i class="ri-flow-chart" style="color:var(--text-muted);margin-right:6px"></i> ';
    refsHtml += '<strong>View Object:</strong> <code style="font-size:0.72rem">' + (m.full_path || m.pvo_name) + '</code>';
    refsHtml += '</div>';

    refsHtml += '</div></div>';

    document.getElementById('tab-overview').innerHTML = statsHtml + introHtml + tablesCardHtml + refsHtml;

    };
    var ah = attrHeaders[currentLang] || attrHeaders['pt'];

    var attrHtml = '<div class="search-container"><i class="ri-search-line search-icon"></i><input class="search-input" type="text" placeholder="' + t({pt:'Filtrar atributos...', en:'Filter attributes...', es:'Filtrar atributos...'}) + '" oninput="filterAttributes(this.value)"></div>';
    attrHtml += '<div class="table-wrapper"><table id="attributes-table"><thead><tr>';

    (d.attributes || []).forEach(function(attr) {

    document.getElementById('tab-bytable').innerHTML = byTableHtml;

    document.getElementById('f-doc-title').textContent = (m.company || '') + ' · PVO';
    document.getElementById('f-doc-detail').textContent = m.pvo_name + ' · ' + (m.module_code || '');
    document.getElementById('f-seal').innerHTML = '<i class="ri-shield-check-line"></i> ' + t({pt:'Criado por', en:'Created by', es:'Creado por'}) + ' ' + (m.author_name || '') + ' · ' + (m.area || '');

    // Breadcrumb
    var modCode = m.module_code || '';
    var MODULE_NAMES = {GL:'General Ledger',AP:'Accounts Payable',AR:'Accounts Receivable',PO:'Procurement',HCM:'Human Capital Management'};
    var modName = MODULE_NAMES[modCode] || modCode;
    document.getElementById('breadcrumb').innerHTML =
        '<a href="../../../index.html">Oracle Fusion Data Dictionary</a><span class="sep">&rsaquo;</span>' +
        '<a href="../index.html">' + modCode + ' - ' + modName + '</a><span class="sep">&rsaquo;</span>' +
        '<span class="current">' + m.pvo_name + '</span>';
}

/* ====== ATTRIBUTE FILTER ====== */
function filterAttributes(query) {
    var q = query.toLowerCase().trim();
    var rows = document.querySelectorAll('#attributes-table tbody tr');
    rows.forEach(function(row) {
        var text = row.getAttribute('data-search') || '';
        row.style.display = !q || text.indexOf(q) >= 0 ? '' : 'none';
    });
}

function filterByTable(query) {
    var q = query.toLowerCase().trim();
    var cards = document.querySelectorAll('.bt-card');
    cards.forEach(function(card) {
        var rows = card.querySelectorAll('tbody tr');
        var visibleRows = 0;
        rows.forEach(function(row) {
            var text = row.textContent.toLowerCase();
            var match = !q || text.indexOf(q) >= 0;
            row.style.display = match ? '' : 'none';
            if (match) visibleRows++;
        });
        // Hide entire card if no rows match
        card.style.display = (!q || visibleRows > 0) ? '' : 'none';
        // Expand card if filtering and has matches
        if (q && visibleRows > 0) {
            var body = card.querySelector('.card-body');
            if (body) body.classList.remove('collapsed');
        }
    });
}

/* ====== INIT ====== */
(function() {
    var savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') {
        document.body.setAttribute('data-theme', 'light');
        document.getElementById('theme-icon').className = 'ri-moon-line';
    }

    render();

    var urlLang = new URLSearchParams(window.location.search).get('lang');
    var targetLang = urlLang || localStorage.getItem('preferred-lang');
    if (targetLang && targetLang !== 'pt') {
        switchLang(targetLang);
    }

    // Back to top
    var btn = document.getElementById('backToTop');
    window.addEventListener('scroll', function() {
        btn.classList.toggle('visible', window.scrollY > 300);
    });
})();
</script>
