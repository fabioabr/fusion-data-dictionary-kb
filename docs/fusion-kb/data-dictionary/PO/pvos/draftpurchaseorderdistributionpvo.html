/* ====== DESIGN TOKENS (dark — default) ====== */

}

/* ====== RESET ====== */
html, body, div, span, h1, h2, h3, h4, h5, h6, p, a, img, ul, ol, li,
header, footer, nav, section, article, aside, button, input, select, textarea,
table, tr, td, th, form, label, fieldset, legend { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
.container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }
main.container { background: var(--card-bg); border-radius: 16px; padding: 0 32px 32px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); margin-top: 30px; margin-bottom: 32px; }

.header { background: linear-gradient(135deg, #1a2332 0%, #15202e 50%, #1a2838 100%); color: white; padding: 36px 0 0; position: relative; overflow: hidden; }

.lang-btn { display: inline-flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.08); border: 2px solid transparent; border-radius: 8px; padding: 4px 10px 4px 8px; font-family: 'Poppins', sans-serif; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.3px; color: rgba(255,255,255,0.55); cursor: pointer; transition: all 0.25s; line-height: 1; }

[data-theme="light"] .lang-btn:hover { background: rgba(255,255,255,0.28); color: rgba(255,255,255,0.95); }

/* ====== TABS ====== */
.tabs-nav { display: flex; gap: 4px; margin-top: 36px; overflow-x: auto; }
.tab-btn { padding: 10px 24px; background: rgba(255,255,255,0.1); border: none; border-radius: 10px 10px 0 0; color: rgba(255,255,255,0.7); font-family: 'Poppins', sans-serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
.tab-btn:hover { background: rgba(255,255,255,0.18); color: white; }
.tab-btn.active { background: var(--bg); color: var(--primary); font-weight: 600; }
[data-theme="light"] .header { background: linear-gradient(135deg, #1a2332 0%, #15202e 50%, #1a2838 100%); color: white; }

.tab-btn i { font-size: 1.1rem; }

.tab-btn.active .tab-count { background: var(--primary-light); color: var(--primary); }
.tab-content { display: none; padding-top: 24px; padding-bottom: 32px; }
.tab-content.active { display: block; }

/* ====== STATS ====== */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
.stat-card { background: var(--card-bg); border-radius: 12px; padding: 18px 20px; box-shadow: var(--card-shadow); border: 1px solid var(--border); display: flex; align-items: center; gap: 14px; transition: box-shadow 0.2s, border-color 0.2s, background 0.2s; }
.stat-card:hover { box-shadow: var(--card-shadow); border-color: var(--primary); background: var(--th-bg-hover); }
.stat-card-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; color: white; flex-shrink: 0; }
.stat-card-info { flex: 1; }
.stat-card-number { font-size: 1.12rem; font-weight: 700; line-height: 1.1; }
.stat-card-label { font-size: 0.72rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.3px; }

/* ====== INTRO TEXT ====== */
.intro-text { font-size: 0.88rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 24px; padding: 16px 20px; background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); border-left: 3px solid var(--primary); box-shadow: var(--card-shadow); }

/* ====== CARDS ====== */
.card { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.03); overflow: hidden; margin-bottom: 20px; transition: box-shadow 0.2s, border-color 0.2s; }
.card:hover { box-shadow: var(--card-shadow); border-color: var(--primary); }
.card:hover > .card-header { background: var(--th-bg-hover); }
.card-header { display: flex; align-items: center; gap: 10px; padding: 14px 18px; border-bottom: 1px solid var(--border); background: var(--card-header-bg); cursor: pointer; }
.card-header-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; color: white; flex-shrink: 0; }
.card-title { font-weight: 600; font-size: 0.95rem; flex: 1; }
.card-badge { padding: 2px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; white-space: nowrap; }
.card-body { padding: 18px; }

/* ====== COLLAPSIBLE CARDS ====== */
.card-header .collapse-icon { transition: transform 0.2s; font-size: 1rem; color: var(--text-muted); }
.card-header .collapse-icon.collapsed { transform: rotate(-90deg); }
.card-body.collapsed { display: none; }

/* ====== ALERTS ====== */
.alert { padding: 12px 16px; border-radius: 8px; font-size: 0.82rem; margin-bottom: 10px; border: 1px solid; line-height: 1.6; }
.alert > i:first-child { font-size: 1.1rem; margin-right: 8px; vertical-align: middle; }
.alert-warning { background: var(--warning-light); border-color: var(--warning-border); color: var(--alert-warning-text); }
.alert-danger { background: var(--danger-light); border-color: var(--danger-border); color: var(--alert-danger-text); }
.alert-info { background: var(--info-light); border-color: var(--info-border); color: var(--alert-info-text); }
.alert-success { background: var(--success-light); border-color: var(--success-border); color: var(--alert-success-text); }

/* ====== PILLS ====== */
.pill { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; }
.pill-success { background: var(--success-light); color: var(--pill-success-text); border: 1px solid var(--success-border); }
.pill-info { background: var(--info-light); color: var(--pill-info-text); border: 1px solid var(--info-border); }
.pill-warning { background: var(--warning-light); color: var(--pill-warning-text); border: 1px solid var(--warning-border); }
.pill-danger { background: var(--danger-light); color: var(--alert-danger-text); border: 1px solid var(--danger-border); }

/* ====== TABLE ====== */
.table-wrapper { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
th { text-align: left; padding: 10px 14px; background: var(--th-bg); font-weight: 600; border-bottom: 2px solid var(--border); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.3px; color: var(--text-muted); transition: background 0.2s; }
thead tr:hover th { background: var(--th-bg-hover); }
td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
tr:hover { background: var(--primary-light); }
code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 0.78rem; border: 1px solid var(--border); }
.col-name { font-family: 'Courier New', monospace; font-weight: 600; color: var(--primary); font-size: 0.78rem; }
.col-type { font-family: 'Courier New', monospace; font-size: 0.72rem; color: var(--text-muted); }

/* ====== SEARCH ====== */
.search-container { position: relative; margin-bottom: 24px; }
.search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.1rem; }
.search-input { width: 100%; padding: 12px 16px 12px 44px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: 'Poppins', sans-serif; font-size: 0.88rem; outline: none; transition: border-color 0.2s; }
.search-input:focus { border-color: var(--primary); }
.search-input::placeholder { color: var(--text-muted); }

/* ====== WIKILINKS ====== */
a.wikilink { color: var(--primary); text-decoration: none; border-bottom: 1px dotted var(--primary); transition: all 0.2s; }
a.wikilink:hover { color: var(--info); border-bottom-style: solid; }
span.broken-link { color: var(--warning); border-bottom: 1px dashed var(--warning); cursor: help; }

/* ====== RELATIONSHIP CARDS ====== */
.rel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
.rel-card { background: var(--card-header-bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; transition: all 0.2s; text-decoration: none; color: var(--text); }
.rel-card:hover { border-color: var(--primary); box-shadow: var(--card-shadow); }
.rel-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; color: white; flex-shrink: 0; }
.rel-table { font-weight: 600; font-size: 0.85rem; }
.rel-col { font-family: 'Courier New', monospace; font-size: 0.72rem; color: var(--text-muted); }
.rel-desc { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }

/* ====== SQL BLOCKS ====== */
.sql-block { background: var(--card-header-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
.sql-header { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 0.82rem; font-weight: 600; display: flex; align-items: center; gap: 8px; background: var(--th-bg); }
.sql-header i { color: var(--purple); }
pre.sql-code { margin: 0; padding: 16px; font-family: 'Courier New', monospace; font-size: 0.82rem; line-height: 1.6; overflow-x: auto; color: var(--text); white-space: pre; }
.kw { color: var(--purple); font-weight: 600; }

.note-item { padding: 12px 16px; border-left: 3px solid var(--primary); margin-bottom: 8px; background: var(--card-header-bg); border-radius: 0 8px 8px 0; font-size: 0.82rem; line-height: 1.5; }

/* ====== FILTER LIST ====== */
.filter-list { list-style: none; }
.filter-list li { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 0.82rem; display: flex; align-items: center; gap: 12px; }

/* ====== FOOTER ====== */
.footer { background: linear-gradient(135deg, #1a2332 0%, #15202e 50%, #1a2838 100%); color: white; padding: 36px 0; position: relative; overflow: hidden; margin-top: 0; }
.footer::before { content: ''; position: absolute; bottom: -50%; left: -10%; width: 500px; height: 500px; background: rgba(255,255,255,0.03); border-radius: 50%; z-index: 0; }
.footer-content { position: relative; z-index: 1; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 24px; }
.footer-left { display: flex; align-items: center; gap: 16px; }
.footer-avatar { width: 48px; height: 48px; border-radius: 12px; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 700; backdrop-filter: blur(10px); }
.footer-author-name { font-size: 0.95rem; font-weight: 600; }
.footer-author-role { font-size: 0.78rem; opacity: 0.7; }
.footer-author-email { font-size: 0.72rem; opacity: 0.55; }
.footer-author-email a { color: rgba(255,255,255,0.55); text-decoration: none; }
.footer-author-email a:hover { color: white; text-decoration: underline; }
.footer-author-date { font-size: 0.72rem; opacity: 0.55; }
.footer-right { text-align: right; }
.footer-doc-title { font-size: 0.85rem; font-weight: 500; opacity: 0.9; }
.footer-doc-detail { font-size: 0.72rem; opacity: 0.6; margin-top: 2px; }
.footer-seal { display: flex; align-items: center; gap: 8px; margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.12); font-size: 0.7rem; opacity: 0.5; justify-content: center; }
.footer-seal i { font-size: 1rem; }

/* ====== BREADCRUMB ROW ====== */
.header-breadcrumb-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.header-right-top { display: flex; align-items: center; }
.breadcrumb { font-size: 0.78rem; color: rgba(255,255,255,0.5); }
.breadcrumb a { color: rgba(255,255,255,0.65); text-decoration: none; }

.breadcrumb .sep { margin: 0 6px; opacity: 0.4; }

/* ====== BACK TO TOP ====== */
.back-to-top { position: fixed; bottom: 32px; right: 32px; width: 44px; height: 44px; border-radius: 12px; background: var(--primary); color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; box-shadow: 0 4px 16px rgba(91,164,217,0.35); opacity: 0; visibility: hidden; transform: translateY(10px); transition: opacity 0.3s, visibility 0.3s, transform 0.3s, background 0.2s; z-index: 999; }
.back-to-top.visible { opacity: 1; visibility: visible; transform: translateY(0); }
.back-to-top:hover { background: var(--primary-dark); box-shadow: 0 6px 20px rgba(91,164,217,0.5); }

/* ====== UTILITIES ====== */
.bg-primary { background: var(--primary); } .bg-success { background: var(--success); }
.bg-info { background: var(--info); } .bg-warning { background: var(--warning); }
.bg-danger { background: var(--danger); } .bg-purple { background: var(--purple); }
.bg-orange { background: var(--orange); } .bg-teal { background: var(--teal); }
.bg-secondary { background: var(--secondary); }

/* ====== TABLE LINK CHIPS ====== */
.table-chip { display: inline-flex; align-items: center; gap: 6px; background: var(--card-header-bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; font-size: 0.82rem; font-weight: 500; transition: all 0.2s; text-decoration: none; color: var(--text); margin: 4px; }
.table-chip:hover { border-color: var(--primary); box-shadow: var(--card-shadow); color: var(--primary); }

@media (max-width: 768px) {

@media print {

<script>
/* ====== i18n ====== */
var _urlLang = new URLSearchParams(window.location.search).get('lang');
var currentLang = _urlLang || localStorage.getItem('preferred-lang') || 'pt';

var _i18nMap = {};
(DATA.i18n || []).forEach(function(item) {
    if (item.br) {
        _i18nMap[item.br] = { en: item.en, es: item.es };
        _i18nMap[item.br.toLowerCase()] = { en: item.en, es: item.es };
    }
});

function _lookup(text) {
    if (!text || currentLang === 'pt') return null;
    var clean = text.replace(/<[^>]+>/g, '').trim();
    var found = _i18nMap[clean] || _i18nMap[clean.toLowerCase()];
    if (found && found[currentLang]) return found[currentLang];
    var bestKey = null;
    var bestLen = 0;
    for (var key in _i18nMap) {
        if (key.length > bestLen && clean.indexOf(key) >= 0 && _i18nMap[key][currentLang]) {
            if (key.length > clean.length * 0.6) {
                bestKey = key;
                bestLen = key.length;
            }
        }
    }
    if (bestKey) return _i18nMap[bestKey][currentLang];
    return null;
}

function t(obj) {
    if (!obj) return '';
    if (typeof obj === 'object' && obj !== null && !Array.isArray(obj)) {
        if (obj[currentLang]) return obj[currentLang];
        var ptVal = obj['pt'] || obj['en'] || '';
        if (currentLang === 'pt') return ptVal;
        var translated = _lookup(ptVal);
        if (translated) return translated;
        return _multiReplace(ptVal);
    }
    if (typeof obj === 'string') {
        if (currentLang === 'pt') return obj;
        var translated = _lookup(obj);
        if (translated) return translated;
        return _multiReplace(obj);
    }
    return String(obj);
}

function _multiReplace(text) {
    if (!text || currentLang === 'pt') return text;
    var clean = text.replace(/<[^>]+>/g, '');
    var result = text;
    var keys = Object.keys(_i18nMap).filter(function(k) {
        return k.length > 5 && _i18nMap[k][currentLang] && clean.indexOf(k) >= 0;
    }).sort(function(a, b) { return b.length - a.length; });
    if (keys.length === 0) return text;
    var working = clean;
    keys.forEach(function(key) {
        var translated = _i18nMap[key][currentLang];
        if (translated && working.indexOf(key) >= 0) {
            working = working.replace(key, translated);
        }
    });
    if (working !== clean) return working;
    return text;
}

function tList(arr) {
    if (!arr) return [];
    if (!Array.isArray(arr) && typeof arr === 'object') {
        var ptList = arr['pt'] || [];
        if (currentLang === 'pt') return ptList;
        return ptList.map(function(item) { return t(item); });
    }
    return arr.map(function(item) { return t(item); });
}

function switchLang(lang) {
    var activeTab = document.querySelector('.tab-btn.active');
    var activeTabId = activeTab ? activeTab.getAttribute('data-tab') : null;
    currentLang = lang;
    localStorage.setItem('preferred-lang', lang);
    document.querySelectorAll('.lang-btn').forEach(function(b) { b.classList.remove('active'); });
    var btn = document.getElementById('lang-' + lang);
    if (btn) btn.classList.add('active');
    render();
    if (activeTabId) switchTab(activeTabId);
}

/* ====== THEME ====== */
function toggleTheme() {
    var current = document.body.getAttribute('data-theme');
    document.body.setAttribute('data-theme', current === 'light' ? '' : 'light');
    document.getElementById('theme-icon').className = current === 'light' ? 'ri-sun-line' : 'ri-moon-line';
    localStorage.setItem('theme', document.body.getAttribute('data-theme') || 'dark');
}

/* ====== TABS ====== */
function switchTab(id) {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
    document.querySelectorAll('.tab-btn').forEach(function(b) {
        if (b.getAttribute('data-tab') === id) b.classList.add('active');
    });
    var el = document.getElementById('tab-' + id);
    if (el) el.classList.add('active');
}

/* ====== LINK RESOLVER ====== */
function resolveTableLink(tableName, currentModule) {
    if (!DATA.table_map) return { href: '#', cls: 'broken-link', title: 'Link not resolved' };
    var upper = tableName.toUpperCase();
    var targetModule = DATA.table_map[upper];
    if (!targetModule) return { href: '#', cls: 'broken-link', title: 'Link not resolved' };
    if (targetModule === currentModule) {
        return { href: '../tables/' + tableName.toLowerCase() + '.html', cls: 'wikilink' };
    }
    return { href: '../../' + targetModule + '/tables/' + tableName.toLowerCase() + '.html', cls: 'wikilink' };
}

function langParam() {
    return currentLang !== 'pt' ? '?lang=' + currentLang : '';
}

function tableLinkHtml(tableName) {
    var mod = DATA.meta.module_code || '';
    var r = resolveTableLink(tableName, mod);
    if (r.cls === 'broken-link') {
        return '<span class="broken-link" title="' + (r.title || '') + '">' + tableName + '</span>';
    }
    return '<a href="' + r.href + langParam() + '" class="wikilink">' + tableName + '</a>';
}

/* ====== COLLAPSIBLE TOGGLE ====== */
function toggleCard(cardId) {
    var body = document.getElementById('card-body-' + cardId);
    var icon = document.getElementById('collapse-icon-' + cardId);
    if (body && icon) {
        body.classList.toggle('collapsed');
        icon.classList.toggle('collapsed');
    }
}

/* ====== CHECK ICON ====== */
function checkIcon(val) {
    if (val) return '<i class="ri-checkbox-circle-fill" style="color:var(--success);font-size:1.1rem"></i>';
    return '';
}

/* ====== TABLE COLOR MAP ====== */
var _tableColors = {};
var _colorPalette = [
    {bg: 'rgba(91,164,217,0.15)', border: 'rgba(91,164,217,0.4)', text: 'var(--primary)'},
    {bg: 'rgba(106,191,59,0.15)', border: 'rgba(106,191,59,0.4)', text: 'var(--success)'},
    {bg: 'rgba(155,150,255,0.15)', border: 'rgba(155,150,255,0.4)', text: 'var(--purple)'},
    {bg: 'rgba(244,172,0,0.15)', border: 'rgba(244,172,0,0.4)', text: 'var(--warning)'},
    {bg: 'rgba(56,189,248,0.15)', border: 'rgba(56,189,248,0.4)', text: 'var(--info)'},
    {bg: 'rgba(255,148,115,0.15)', border: 'rgba(255,148,115,0.4)', text: 'var(--orange)'},
    {bg: 'rgba(45,212,191,0.15)', border: 'rgba(45,212,191,0.4)', text: 'var(--teal)'},
    {bg: 'rgba(91,184,196,0.15)', border: 'rgba(91,184,196,0.4)', text: 'var(--secondary)'},
    {bg: 'rgba(232,93,84,0.15)', border: 'rgba(232,93,84,0.4)', text: 'var(--danger)'},
];
function getTableColor(tableName) {
    if (!_tableColors[tableName]) {
        var idx = Object.keys(_tableColors).length % _colorPalette.length;
        _tableColors[tableName] = _colorPalette[idx];
    }
    return _tableColors[tableName];
}
function tableColorText(tableName, isLink) {
    var c = getTableColor(tableName);
    if (isLink) {
        var r = resolveTableLink(tableName, (DATA.meta && DATA.meta.module_code) || '');
        if (r.cls === 'wikilink') {
            return '<a href="' + r.href + langParam() + '" style="color:' + c.text + ';text-decoration:none;font-family:\'Courier New\',monospace;font-size:0.78rem;font-weight:600;border-bottom:1px dotted ' + c.text + '" title="' + tableName + '">' + tableName + '</a>';
        }
    }
    return '<span style="color:' + c.text + ';font-family:\'Courier New\',monospace;font-size:0.78rem;font-weight:600">' + tableName + '</span>';
}
function columnBadge(columnName, tableName) {
    var c = getTableColor(tableName);
    var style = 'display:inline-block;padding:2px 10px;border-radius:10px;font-size:0.7rem;font-family:\'Courier New\',monospace;font-weight:500;background:' + c.bg + ';color:' + c.text + ';border:1px solid ' + c.border;
    return '<span style="' + style + '">' + columnName + '</span>';
}

/* ====== RENDER ====== */
function render() {
    var d = DATA;
    var m = d.meta;
    // Reset table colors on re-render
    _tableColors = {};

    // Header
    document.getElementById('h-title').textContent = m.pvo_name;
    document.getElementById('h-subtitle').textContent = (m.module_path || m.full_path || '') + ' — PVO Mapping';
    document.getElementById('h-badges').innerHTML =
        '<div class="header-badge"><i class="ri-apps-line"></i> ' + (m.module_code || '') + '</div>' +
        '<div class="header-badge"><i class="ri-list-check"></i> ' + d.stats.total_attributes + ' ' + t({pt:'Atributos', en:'Attributes', es:'Atributos'}) + '</div>' +
        '<div class="header-badge"><i class="ri-pie-chart-line"></i> BICC ' + d.stats.bicc_pct + '%</div>';

    // Tabs
    var tabLabels = {
        overview: {pt:'Visao Geral', en:'Overview', es:'Vision General'},
        attributes: {pt:'Mapeamento de Atributos', en:'Attribute Mapping', es:'Mapeo de Atributos'},
        bytable: {pt:'Por Tabela', en:'By Table', es:'Por Tabla'}
    };
    document.getElementById('tabs-nav').innerHTML =
        '<button class="tab-btn active" data-tab="overview" onclick="switchTab(\'overview\')"><i class="ri-information-line"></i> ' + t(tabLabels.overview) + '</button>' +
        '<button class="tab-btn" data-tab="attributes" onclick="switchTab(\'attributes\')"><i class="ri-table-line"></i> ' + t(tabLabels.attributes) + ' <span class="tab-count">' + d.stats.total_attributes + '</span></button>' +
        '<button class="tab-btn" data-tab="bytable" onclick="switchTab(\'bytable\')"><i class="ri-stack-line"></i> ' + t(tabLabels.bytable) + ' <span class="tab-count">' + d.stats.tables_count + '</span></button>';

    // ========== Tab 1: Overview ==========
    var statsHtml =
        '<div class="stats-grid">' +
        '<div class="stat-card"><div class="stat-card-icon bg-primary"><i class="ri-list-check"></i></div><div class="stat-card-info"><div class="stat-card-number" style="color:var(--primary)">' + d.stats.total_attributes + '</div><div class="stat-card-label">' + t({pt:'Total Atributos', en:'Total Attributes', es:'Total Atributos'}) + '</div></div></div>' +
        '<div class="stat-card"><div class="stat-card-icon bg-info"><i class="ri-database-2-line"></i></div><div class="stat-card-info"><div class="stat-card-number" style="color:var(--info)">' + d.stats.tables_count + '</div><div class="stat-card-label">' + t({pt:'Tabelas', en:'Tables', es:'Tablas'}) + '</div></div></div>' +
        '<div class="stat-card"><div class="stat-card-icon bg-success"><i class="ri-checkbox-circle-line"></i></div><div class="stat-card-info"><div class="stat-card-number" style="color:var(--success)">' + d.stats.bicc_enabled + ' <span style="font-size:0.75rem;font-weight:400;color:var(--text-muted)">(' + d.stats.bicc_pct + '%)</span></div><div class="stat-card-label">BICC Enabled</div></div></div>' +
        '<div class="stat-card"><div class="stat-card-icon bg-warning"><i class="ri-key-line"></i></div><div class="stat-card-info"><div class="stat-card-number" style="color:var(--warning)">' + d.stats.pk_count + '</div><div class="stat-card-label">Primary Keys</div></div></div>' +
        '</div>';

    var descText = t(m.description || '');
    var introHtml = '<div class="intro-text">' +
        '<p style="margin-bottom:10px">' + descText + '</p>' +
        '<p style="font-size:0.78rem;color:var(--text-muted)"><i class="ri-flow-chart" style="margin-right:6px"></i> <strong>PVO path:</strong> <code style="font-size:0.72rem">' + (m.full_path || m.pvo_name) + '</code></p>' +
        '</div>';

    // Tables base card
    var tablesCardHtml = '';
    if (d.tables && d.tables.length) {
        tablesCardHtml = '<div class="card"><div class="card-header"><div class="card-header-icon bg-info"><i class="ri-database-2-line"></i></div><div class="card-title">' + t({pt:'Tabelas Base', en:'Base Tables', es:'Tablas Base'}) + '</div><div class="card-badge pill-info">' + d.tables.length + '</div></div><div class="card-body">';
        d.tables.forEach(function(tbl) {
            var link = resolveTableLink(tbl, m.module_code || '');
            if (link.cls === 'wikilink') {
                tablesCardHtml += '<a href="' + link.href + langParam() + '" class="table-chip"><i class="ri-table-line"></i> ' + tbl + '</a>';
            } else {
                tablesCardHtml += '<span class="table-chip" style="cursor:default"><i class="ri-table-line"></i> ' + tbl + '</span>';
            }
        });
        tablesCardHtml += '</div></div>';
    }

    // References card
    var refsHtml = '<div class="card"><div class="card-header"><div class="card-header-icon bg-purple"><i class="ri-links-line"></i></div><div class="card-title">' + t({pt:'Referências', en:'References', es:'Referencias'}) + '</div></div><div class="card-body">';

    // BICC Mapping source
    refsHtml += '<div style="margin-bottom:10px;font-size:0.82rem"><i class="ri-file-excel-2-line" style="color:var(--success);margin-right:6px"></i> ';
    refsHtml += '<strong>BICC Database Mapping</strong> — Oracle Fusion Cloud Release 13/25A';
    refsHtml += '</div>';

    // Oracle OEDMF docs
    var oedmfBase = 'https://docs.oracle.com/en/cloud/saas/';
    var modPath = (m.module_code === 'HCM') ? 'human-resources' : 'financials';
    var oedmfUrl = oedmfBase + modPath + '/25a/oedmf/';
    refsHtml += '<div style="margin-bottom:10px;font-size:0.82rem"><i class="ri-book-open-line" style="color:var(--info);margin-right:6px"></i> ';
    refsHtml += '<a href="' + oedmfUrl + '" target="_blank" style="color:var(--info);text-decoration:none;border-bottom:1px dotted var(--info)">Oracle Enterprise Data Management Framework (OEDMF) — Release 25A</a>';
    refsHtml += '</div>';

    // Link to main table
    if (d.tables && d.tables.length > 0) {
        var mainTable = d.tables[0];
        var mainLink = resolveTableLink(mainTable, m.module_code || '');
        refsHtml += '<div style="margin-bottom:10px;font-size:0.82rem"><i class="ri-table-2" style="color:var(--primary);margin-right:6px"></i> ';
        refsHtml += t({pt:'Tabela principal: ', en:'Main table: ', es:'Tabla principal: '});
        if (mainLink.cls === 'wikilink') {
            refsHtml += '<a href="' + mainLink.href + langParam() + '" style="color:var(--primary);text-decoration:none;border-bottom:1px dotted var(--primary);font-family:\'Courier New\',monospace;font-size:0.78rem">' + mainTable + '</a>';
        } else {
            refsHtml += '<span style="font-family:\'Courier New\',monospace;font-size:0.78rem">' + mainTable + '</span>';
        }
        refsHtml += '</div>';
    }

    // PVO full path
    refsHtml += '<div style="font-size:0.82rem"><i class="ri-flow-chart" style="color:var(--text-muted);margin-right:6px"></i> ';
    refsHtml += '<strong>View Object:</strong> <code style="font-size:0.72rem">' + (m.full_path || m.pvo_name) + '</code>';
    refsHtml += '</div>';

    refsHtml += '</div></div>';

    document.getElementById('tab-overview').innerHTML = statsHtml + introHtml + tablesCardHtml + refsHtml;

    // ========== Tab 2: Attribute Mapping ==========
    var attrHeaders = {
        pt: ['Atributo (PVO)', 'Tabela', 'Coluna (DB)', 'BICC', 'PK'],
        en: ['Attribute (PVO)', 'Table', 'Column (DB)', 'BICC', 'PK'],
        es: ['Atributo (PVO)', 'Tabla', 'Columna (DB)', 'BICC', 'PK']
    };
    var ah = attrHeaders[currentLang] || attrHeaders['pt'];

    var attrHtml = '<div class="search-container"><i class="ri-search-line search-icon"></i><input class="search-input" type="text" placeholder="' + t({pt:'Filtrar atributos...', en:'Filter attributes...', es:'Filtrar atributos...'}) + '" oninput="filterAttributes(this.value)"></div>';
    attrHtml += '<div class="table-wrapper"><table id="attributes-table"><thead><tr>';
    ah.forEach(function(h, i) { attrHtml += '<th' + (i >= 3 ? ' style="text-align:center"' : '') + '>' + h + '</th>'; });
    attrHtml += '</tr></thead><tbody>';

    (d.attributes || []).forEach(function(attr) {
        var searchText = ((attr.name || '') + ' ' + (attr.table || '') + ' ' + (attr.column || '')).toLowerCase();
        attrHtml += '<tr data-search="' + searchText + '">' +
            '<td class="col-name">' + (attr.name || '') + '</td>' +
            '<td>' + tableColorText(attr.table || '', true) + '</td>' +
            '<td>' + columnBadge(attr.column || '', attr.table || '') + '</td>' +
            '<td style="text-align:center">' + checkIcon(attr.bicc) + '</td>' +
            '<td style="text-align:center">' + checkIcon(attr.pk) + '</td>' +
            '</tr>';
    });
    attrHtml += '</tbody></table></div>';
    document.getElementById('tab-attributes').innerHTML = attrHtml;

    // ========== Tab 3: By Table ==========
    var byTableHtml = '<div class="search-container"><i class="ri-search-line search-icon"></i><input class="search-input" type="text" placeholder="' + t({pt:'Filtrar tabelas...', en:'Filter tables...', es:'Filtrar tablas...'}) + '" oninput="filterByTable(this.value)"></div>';
    var byTableKeys = Object.keys(d.by_table || {});
    byTableKeys.forEach(function(tblName, idx) {
        var items = d.by_table[tblName];
        var cardId = 'bt-' + idx;
        var link = resolveTableLink(tblName, m.module_code || '');
        var titleHtml = link.cls === 'wikilink'
            ? '<a href="' + link.href + langParam() + '" class="wikilink" style="font-weight:600">' + tblName + '</a>'
            : '<span style="font-weight:600">' + tblName + '</span>';

        byTableHtml += '<div class="card bt-card" data-table-name="' + tblName.toLowerCase() + '">' +
            '<div class="card-header" onclick="toggleCard(\'' + cardId + '\')">' +
            '<div class="card-header-icon bg-info"><i class="ri-database-2-line"></i></div>' +
            '<div class="card-title">' + titleHtml + '</div>' +
            '<div class="card-badge pill-info">' + items.length + '</div>' +
            '<i class="ri-arrow-down-s-line collapse-icon" id="collapse-icon-' + cardId + '"></i>' +
            '</div>' +
            '<div class="card-body" id="card-body-' + cardId + '">';

        var miniHeaders = {
            pt: ['Atributo', 'Coluna', 'BICC', 'PK'],
            en: ['Attribute', 'Column', 'BICC', 'PK'],
            es: ['Atributo', 'Columna', 'BICC', 'PK']
        };
        var mh = miniHeaders[currentLang] || miniHeaders['pt'];

        byTableHtml += '<div class="table-wrapper"><table><thead><tr>';
        mh.forEach(function(h, i) { byTableHtml += '<th' + (i >= 2 ? ' style="text-align:center"' : '') + '>' + h + '</th>'; });
        byTableHtml += '</tr></thead><tbody>';

        items.forEach(function(item) {
            byTableHtml += '<tr>' +
                '<td class="col-name">' + (item.attribute || '') + '</td>' +
                '<td>' + columnBadge(item.column || '', tblName) + '</td>' +
                '<td style="text-align:center">' + checkIcon(item.bicc) + '</td>' +
                '<td style="text-align:center">' + checkIcon(item.pk) + '</td>' +
                '</tr>';
        });

        byTableHtml += '</tbody></table></div></div></div>';
    });

    document.getElementById('tab-bytable').innerHTML = byTableHtml;

    // Footer
    document.getElementById('f-initials').textContent = m.author_initials || '';
    document.getElementById('f-name').textContent = m.author_name || '';
    document.getElementById('f-role').textContent = m.author_role || '';
    var email = m.author_email || '';
    document.getElementById('f-email').innerHTML = email ? '<a href="mailto:' + email + '">' + email + '</a>' : '';
    document.getElementById('f-doc-title').textContent = (m.company || '') + ' · PVO';
    document.getElementById('f-doc-detail').textContent = m.pvo_name + ' · ' + (m.module_code || '');
    document.getElementById('f-seal').innerHTML = '<i class="ri-shield-check-line"></i> ' + t({pt:'Criado por', en:'Created by', es:'Creado por'}) + ' ' + (m.author_name || '') + ' · ' + (m.area || '');

    // Breadcrumb
    var modCode = m.module_code || '';
    var MODULE_NAMES = {GL:'General Ledger',AP:'Accounts Payable',AR:'Accounts Receivable',PO:'Procurement',HCM:'Human Capital Management'};
    var modName = MODULE_NAMES[modCode] || modCode;
    document.getElementById('breadcrumb').innerHTML =
        '<a href="../../../index.html">Oracle Fusion Data Dictionary</a><span class="sep">&rsaquo;</span>' +
        '<a href="../index.html">' + modCode + ' - ' + modName + '</a><span class="sep">&rsaquo;</span>' +
        '<span class="current">' + m.pvo_name + '</span>';
}

/* ====== ATTRIBUTE FILTER ====== */
function filterAttributes(query) {
    var q = query.toLowerCase().trim();
    var rows = document.querySelectorAll('#attributes-table tbody tr');
    rows.forEach(function(row) {
        var text = row.getAttribute('data-search') || '';
        row.style.display = !q || text.indexOf(q) >= 0 ? '' : 'none';
    });
}

function filterByTable(query) {
    var q = query.toLowerCase().trim();
    var cards = document.querySelectorAll('.bt-card');
    cards.forEach(function(card) {
        var rows = card.querySelectorAll('tbody tr');
        var visibleRows = 0;
        rows.forEach(function(row) {
            var text = row.textContent.toLowerCase();
            var match = !q || text.indexOf(q) >= 0;
            row.style.display = match ? '' : 'none';
            if (match) visibleRows++;
        });
        // Hide entire card if no rows match
        card.style.display = (!q || visibleRows > 0) ? '' : 'none';
        // Expand card if filtering and has matches
        if (q && visibleRows > 0) {
            var body = card.querySelector('.card-body');
            if (body) body.classList.remove('collapsed');
        }
    });
}

/* ====== INIT ====== */
(function() {
    var savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') {
        document.body.setAttribute('data-theme', 'light');
        document.getElementById('theme-icon').className = 'ri-moon-line';
    }

    render();

    var urlLang = new URLSearchParams(window.location.search).get('lang');
    var targetLang = urlLang || localStorage.getItem('preferred-lang');
    if (targetLang && targetLang !== 'pt') {
        switchLang(targetLang);
    }

    // Back to top
    var btn = document.getElementById('backToTop');
    window.addEventListener('scroll', function() {
        btn.classList.toggle('visible', window.scrollY > 300);
    });
})();
</script>
