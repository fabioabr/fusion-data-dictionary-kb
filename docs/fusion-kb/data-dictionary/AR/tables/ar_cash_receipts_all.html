  "sql": [
    {
      "title": {
        "pt": "Listar recebimentos não-aplicados"
      },
      "code": "SELECT cr.RECEIPT_NUMBER, cr.AMOUNT, cr.CURRENCY_CODE,\n       cr.RECEIPT_DATE, cr.STATUS\nFROM   AR_CASH_RECEIPTS_ALL cr\nWHERE  cr.STATUS = 'UNAPP'\n  AND  cr.ORG_ID = :p_org_id;"
    },
    {
      "title": {
        "pt": "Recebimentos com dados do cliente"
      },
      "code": "SELECT cr.RECEIPT_NUMBER, cr.AMOUNT, cr.RECEIPT_DATE,\n       hca.ACCOUNT_NUMBER, hca.ACCOUNT_NAME\nFROM   AR_CASH_RECEIPTS_ALL cr\nJOIN   HZ_CUST_ACCOUNTS hca ON hca.CUST_ACCOUNT_ID = cr.PAY_FROM_CUSTOMER\nWHERE  cr.RECEIPT_DATE BETWEEN :start_date AND :end_date\n  AND  cr.ORG_ID = :p_org_id;"
    }
  ],
  "filters": [
    {
      "code": "STATUS = 'APP'",
      "desc": {
        "pt": "`STATUS = 'APP'` — Recebimentos aplicados"
      }
    },
    {
      "code": "STATUS = 'UNAPP'",
      "desc": {
        "pt": "`STATUS = 'UNAPP'` — Recebimentos não-aplicados"
      }
    },
    {
      "code": "TYPE = 'CASH'",
      "desc": {
        "pt": "`TYPE = 'CASH'` — Apenas recebimentos de caixa (exclui misc)"
      }
    },
    {
      "code": "RECEIPT_DATE BETWEEN :start AND :end",
      "desc": {
        "pt": "`RECEIPT_DATE BETWEEN :start AND :end` — Período"
      }
    }
  ],
  "notes": {
    "pt": [
      "O campo <code>STATUS</code> controla o ciclo de vida: <strong>APP</strong> (aplicado), <strong>UNAPP</strong> (não-aplicado), <strong>UNID</strong> (não-identificado), <strong>NSF</strong> (sem fundos), <strong>REV</strong> (revertido), <strong>STOP</strong> (parado).",
      "Recebimentos do tipo <strong>MISC</strong> (avulsos) utilizam <code>DISTRIBUTION_SET_ID</code> para contabilização direta, sem vinculação a faturas.",
      "A coluna <code>CASH_RECEIPT_HISTORY_ID</code> aponta para o registro <strong>mais recente</strong> do histórico em [[ar_cash_receipt_history_all]].",
      "Campos <code>REVERSAL_*</code> são preenchidos apenas quando o recebimento é revertido.",
      "A tabela possui <strong>Descriptive Flexfields (DFF)</strong> via colunas <code>ATTRIBUTE1–15</code> para customizações por implementação."
    ]
  },

    {
      "id": 2,
      "br": "Armazena um registro para cada recebimento (receipt) do módulo Accounts Receivable. Cada linha representa um recebimento individual, contendo valor, moeda, data, status do ciclo de vida (APP, UNAPP, UNID, NSF, REV, STOP) e referência ao cliente pagador. É a tabela central para rastreamento de todos os recebimentos de caixa, sejam eles manuais, automáticos ou importados via interface.",
      "en": "Stores a record for each receipt from the Accounts Receivable module. Each row represents an individual receipt, containing value, currency, date, status (APP, UNAPP, UNID, NSF, REV, STOP) and reference to the payer customer. It is the central table for tracking all cash receipts, whether manual, automatic or imported via interface.",
      "es": "Almacena un registro para cada cobro del módulo Accounts Receivable. Cada fila representa un cobro individual, que contiene valor, moneda, fecha, estado del ciclo de vida (APP, UNAPP, UNID, NSF, REV, STOP) y referencia al cliente pagador. Es la tabla central para el seguimiento de todos los cobros de efectivo, ya sean manuales, automáticos o importados a través de la interfaz."

<script>
/* ====== i18n ====== */
// Resolve lang: URL param > localStorage > default
var _urlLang = new URLSearchParams(window.location.search).get('lang');
var currentLang = _urlLang || localStorage.getItem('preferred-lang') || 'pt';

// Build i18n lookup map: { "texto br": {en: "...", es: "..."} }
var _i18nMap = {};
(DATA.i18n || []).forEach(function(item) {
    if (item.br) {
        _i18nMap[item.br] = { en: item.en, es: item.es };
        // Also index lowercase for fuzzy matching
        _i18nMap[item.br.toLowerCase()] = { en: item.en, es: item.es };
    }
});

function _lookup(text) {
    if (!text || currentLang === 'pt') return null;
    // Strip HTML tags for matching
    var clean = text.replace(/<[^>]+>/g, '').trim();
    // 1. Exact match
    var found = _i18nMap[clean] || _i18nMap[clean.toLowerCase()];
    if (found && found[currentLang]) return found[currentLang];
    // 2. Substring match — find longest i18n key contained in the text
    var bestKey = null;
    var bestLen = 0;
    for (var key in _i18nMap) {
        if (key.length > bestLen && clean.indexOf(key) >= 0 && _i18nMap[key][currentLang]) {
            // Only match if it's a substantial portion (>60% of the text)
            if (key.length > clean.length * 0.6) {
                bestKey = key;
                bestLen = key.length;
            }
        }
    }
    if (bestKey) return _i18nMap[bestKey][currentLang];
    return null;
}

function t(obj) {
    if (!obj) return '';
    // If it's an i18n object {pt, en, es}
    if (typeof obj === 'object' && obj !== null && !Array.isArray(obj)) {
        // If target lang exists, use it directly
        if (obj[currentLang]) return obj[currentLang];
        // Otherwise, take PT value and try i18n lookup
        var ptVal = obj['pt'] || obj['en'] || '';
        if (currentLang === 'pt') return ptVal;
        // Lookup PT value in i18n map
        var translated = _lookup(ptVal);
        if (translated) return translated;
        return _multiReplace(ptVal);
    }
    // If it's a string, try lookup in i18n map
    if (typeof obj === 'string') {
        if (currentLang === 'pt') return obj;
        // First try exact lookup
        var translated = _lookup(obj);
        if (translated) return translated;
        // Then try multi-replace: find all i18n keys contained in text and replace
        return _multiReplace(obj);
    }
    return String(obj);
}

function _multiReplace(text) {
    if (!text || currentLang === 'pt') return text;
    var clean = text.replace(/<[^>]+>/g, '');
    var result = text;
    // Sort keys by length descending (longest match first)
    var keys = Object.keys(_i18nMap).filter(function(k) {
        return k.length > 5 && _i18nMap[k][currentLang] && clean.indexOf(k) >= 0;
    }).sort(function(a, b) { return b.length - a.length; });

    if (keys.length === 0) return text;

    // For long texts, rebuild by replacing BR segments with translations
    // Strip HTML, replace, then we lose formatting — acceptable tradeoff
    var working = clean;
    keys.forEach(function(key) {
        var translated = _i18nMap[key][currentLang];
        if (translated && working.indexOf(key) >= 0) {
            working = working.replace(key, translated);
        }
    });

    // If we made changes, return the translated version (without HTML formatting)
    if (working !== clean) return working;
    return text;
}

function tList(arr) {
    if (!arr) return [];
    // If it's an i18n object {pt: [...], en: [...], es: [...]}
    if (!Array.isArray(arr) && typeof arr === 'object') {
        var ptList = arr['pt'] || [];
        if (currentLang === 'pt') return ptList;
        // Translate each PT item via lookup
        return ptList.map(function(item) { return t(item); });
    }
    // If it's a plain array, translate each item
    return arr.map(function(item) { return t(item); });
}

function switchLang(lang) {
    // Save current active tab before re-render
    var activeTab = document.querySelector('.tab-btn.active');
    var activeTabId = activeTab ? activeTab.getAttribute('data-tab') : null;

    currentLang = lang;
    localStorage.setItem('preferred-lang', lang);
    document.querySelectorAll('.lang-btn').forEach(function(b) { b.classList.remove('active'); });
    var btn = document.getElementById('lang-' + lang);
    if (btn) btn.classList.add('active');
    render();

    // Restore active tab
    if (activeTabId) switchTab(activeTabId);
}

/* ====== THEME ====== */
function toggleTheme() {
    var current = document.body.getAttribute('data-theme');
    document.body.setAttribute('data-theme', current === 'light' ? '' : 'light');
    document.getElementById('theme-icon').className = current === 'light' ? 'ri-sun-line' : 'ri-moon-line';
    localStorage.setItem('theme', document.body.getAttribute('data-theme') || 'dark');
}

/* ====== TABS ====== */
function switchTab(id) {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
    document.querySelectorAll('.tab-btn').forEach(function(b) {
        if (b.getAttribute('data-tab') === id) b.classList.add('active');
    });
    var el = document.getElementById('tab-' + id);
    if (el) el.classList.add('active');
}

/* ====== LINK RESOLVER ====== */
function resolveLink(tableName, currentModule) {
    if (!DATA.table_map) return { href: '#', cls: 'broken-link' };
    var upper = tableName.toUpperCase();
    var targetModule = DATA.table_map[upper];
    if (!targetModule) return { href: '#', cls: 'broken-link', title: 'Link não resolvido' };
    if (targetModule === currentModule) {
        return { href: './' + tableName.toLowerCase() + '.html', cls: 'wikilink' };
    }
    return { href: '../../' + targetModule + '/tables/' + tableName.toLowerCase() + '.html', cls: 'wikilink' };
}

function langParam() {
    return currentLang !== 'pt' ? '?lang=' + currentLang : '';
}

function linkHtml(tableName) {
    var mod = DATA.meta.module_code || '';
    var r = resolveLink(tableName, mod);
    if (r.cls === 'broken-link') {
        return '<span class="broken-link" title="' + (r.title || '') + '">' + tableName + '</span>';
    }
    return '<a href="' + r.href + langParam() + '" class="wikilink">' + tableName + '</a>';
}

        '">' + cat + '</span>';

function confPill(pct) {
    if (pct >= 81) return '<span class="pill pill-success">🟢 ' + pct + '%</span>';
    if (pct >= 51) return '<span class="pill pill-warning">🟡 ' + pct + '%</span>';
    return '<span class="pill pill-danger">🔴 ' + pct + '%</span>';
}

function render() {

    // Header
    document.getElementById('h-title').textContent = m.table_name;
    document.getElementById('h-subtitle').textContent = t(m.subtitle) + ' — ' + t({pt:'Dicionário de Dados', en:'Data Dictionary', es:'Diccionario de Datos'});

    // Tabs
    var tabLabels = {

        sql: {pt:'SQL', en:'SQL', es:'SQL'},

    };
    var _pvoNames = {};
    (d.related_pvos || []).forEach(function(r) { _pvoNames[r.pvo_name] = 1; });
    var pvosCount = Object.keys(_pvoNames).length;
    document.getElementById('tabs-nav').innerHTML =
        '<button class="tab-btn active" data-tab="overview" onclick="switchTab(\'overview\')"><i class="ri-information-line"></i> ' + t(tabLabels.overview) + '</button>' +
        '<button class="tab-btn" data-tab="columns" onclick="switchTab(\'columns\')"><i class="ri-table-line"></i> ' + t(tabLabels.columns) + ' <span class="tab-count">' + d.columns.length + '</span></button>' +
        '<button class="tab-btn" data-tab="relationships" onclick="switchTab(\'relationships\')"><i class="ri-git-branch-line"></i> ' + t(tabLabels.relationships) + ' <span class="tab-count">' + (d.relationships.parents.length + d.relationships.children.length) + '</span></button>' +
        (pvosCount ? '<button class="tab-btn" data-tab="pvos" onclick="switchTab(\'pvos\')"><i class="ri-database-2-line"></i> ' + t(tabLabels.pvos) + ' <span class="tab-count">' + pvosCount + '</span></button>' : '') +
        '<button class="tab-btn" data-tab="sql" onclick="switchTab(\'sql\')"><i class="ri-code-s-slash-line"></i> SQL <span class="tab-count">' + d.sql.length + '</span></button>';

    // Tab 1: Overview
    var statsHtml =
        '<div class="stats-grid">' +
        '<div class="stat-card"><div class="stat-card-icon bg-primary"><i class="ri-table-line"></i></div><div class="stat-card-info"><div class="stat-card-number" style="color:var(--primary)">' + d.columns.length + '</div><div class="stat-card-label">' + t(tabLabels.columns) + '</div></div></div>' +
        '<div class="stat-card"><div class="stat-card-icon bg-info"><i class="ri-links-line"></i></div><div class="stat-card-info"><div class="stat-card-number" style="color:var(--info)">' + d.relationships.parents.length + '</div><div class="stat-card-label">Foreign Keys</div></div></div>' +
        '<div class="stat-card"><div class="stat-card-icon bg-success"><i class="ri-shield-check-line"></i></div><div class="stat-card-info"><div class="stat-card-number" style="color:var(--success)">' + d.stats.avg_confidence + '%</div><div class="stat-card-label">' + t({pt:'Confiança Média', en:'Avg Confidence', es:'Confianza Promedio'}) + '</div></div></div>' +
        '<div class="stat-card"><div class="stat-card-icon bg-purple"><i class="ri-apps-line"></i></div><div class="stat-card-info"><div class="stat-card-number" style="color:var(--purple)">' + d.stats.categories + '</div><div class="stat-card-label">' + t({pt:'Categorias', en:'Categories', es:'Categorías'}) + '</div></div></div>' +
        (pvosCount ? '<div class="stat-card"><div class="stat-card-icon bg-purple"><i class="ri-database-2-line"></i></div><div class="stat-card-info"><div class="stat-card-number" style="color:var(--purple)">' + pvosCount + '</div><div class="stat-card-label">PVOs</div></div></div>' : '') +
        '</div>';

    var overviewHtml = statsHtml +
        '<div class="intro-text">' + t(d.overview) + '</div>';

    if (d.alert) {
        overviewHtml += '<div class="alert alert-info"><i class="ri-information-line"></i> ' + t(d.alert) + '</div>';
    }

    // Business purpose
    if (d.business_purpose) {
        var bpItems = tList(d.business_purpose);
        if (Array.isArray(bpItems) && bpItems.length) {
            overviewHtml += '<div class="card"><div class="card-header"><div class="card-header-icon bg-info"><i class="ri-briefcase-line"></i></div><div class="card-title">' + t({pt:'Propósito de Negócio', en:'Business Purpose', es:'Propósito de Negocio'}) + '</div></div><div class="card-body"><ul style="list-style:none">';
            bpItems.forEach(function(item) {
                overviewHtml += '<li style="padding:8px 0;border-bottom:1px solid var(--border);font-size:0.85rem">' + item + '</li>';
            });
            overviewHtml += '</ul></div></div>';
        }
    }

    // Notes
    if (d.notes) {
        var notes = tList(d.notes);
        if (Array.isArray(notes)) {
            overviewHtml += '<div class="card"><div class="card-header"><div class="card-header-icon bg-warning"><i class="ri-error-warning-line"></i></div><div class="card-title">' + t({pt:'Observações', en:'Notes', es:'Observaciones'}) + '</div></div><div class="card-body">';
            notes.forEach(function(n) {
                overviewHtml += '<div class="note-item">' + n + '</div>';
            });
            overviewHtml += '</div></div>';
        }
    }

    document.getElementById('tab-overview').innerHTML = overviewHtml;

    // Tab 2: Columns
    var colHeaders = {pt:['#','Coluna','Tipo','Obrigatório','Categoria','Descrição','FK','Confiança'], en:['#','Column','Type','Required','Category','Description','FK','Confidence'], es:['#','Columna','Tipo','Obligatorio','Categoría','Descripción','FK','Confianza']};
    var headers = colHeaders[currentLang] || colHeaders['pt'];
    var colHtml = '<div class="search-container"><i class="ri-search-line search-icon"></i><input class="search-input" type="text" placeholder="' + t({pt:'Filtrar colunas...', en:'Filter columns...', es:'Filtrar columnas...'}) + '" oninput="filterColumns(this.value)"></div>';
    colHtml += '<div class="table-wrapper"><table id="columns-table"><thead><tr>';
    headers.forEach(function(h) { colHtml += '<th>' + h + '</th>'; });
    colHtml += '</tr></thead><tbody>';
    d.columns.forEach(function(col) {
        var fkHtml = col.fk ? linkHtml(col.fk) : '—';
        colHtml += '<tr data-search="' + (col.name + ' ' + t(col.description) + ' ' + t(col.category)).toLowerCase() + '">' +
            '<td>' + col.num + '</td>' +
            '<td class="col-name">' + col.name + '</td>' +
            '<td class="col-type">' + col.type + '</td>' +
            '<td style="text-align:center">' + (col.nullable ? '' : '<i class="ri-checkbox-circle-fill" style="color:var(--success);font-size:1.1rem" title="' + t({pt:'Obrigatório',en:'Required',es:'Obligatorio'}) + '"></i>') + '</td>' +
            '<td>' + catPill(t(col.category)) + '</td>' +
            '<td>' + t(col.description) + '</td>' +
            '<td>' + fkHtml + '</td>' +
            '<td>' + confPill(col.confidence) + '</td>' +
            '</tr>';
    });
    colHtml += '</tbody></table></div>';
    document.getElementById('tab-columns').innerHTML = colHtml;

    // Tab 3: Relationships (table format)
    var relHtml = '';
    var relHeaders = {
        pt: ['Tabela','Coluna (FK)','Descrição','Módulo'],
        en: ['Table','Column (FK)','Description','Module'],
        es: ['Tabla','Columna (FK)','Descripción','Módulo']
    };
    var rh = relHeaders[currentLang] || relHeaders['pt'];

    function relTable(items, title, iconClass, bgClass) {
        if (!items.length) return '';
        var html = '<div class="card"><div class="card-header"><div class="card-header-icon ' + bgClass + '"><i class="' + iconClass + '"></i></div><div class="card-title">' + title + '</div><div class="card-badge pill-info">' + items.length + '</div></div><div class="card-body"><div class="table-wrapper"><table><thead><tr>';
        rh.forEach(function(h) { html += '<th>' + h + '</th>'; });
        html += '</tr></thead><tbody>';
        items.forEach(function(r) {
            var link = resolveLink(r.table, m.module_code);
            var mod = DATA.table_map ? (DATA.table_map[r.table.toUpperCase()] || '?') : '?';
            html += '<tr>' +
                '<td class="col-name">' + (link.cls === 'wikilink' ? '<a href="' + link.href + langParam() + '" class="wikilink">' + r.table + '</a>' : '<span class="broken-link">' + r.table + '</span>') + '</td>' +
                '<td>' + (r.column ? '<code>' + r.column + '</code>' : '—') + '</td>' +
                '<td>' + t(r.desc) + '</td>' +
                '<td><span class="pill pill-info">' + mod + '</span></td>' +
                '</tr>';
        });
        html += '</tbody></table></div></div></div>';
        return html;
    }

    relHtml += relTable(d.relationships.parents,
        t({pt:'Tabelas-pai (FK de entrada)', en:'Parent Tables (Incoming FK)', es:'Tablas padre (FK de entrada)'}),
        'ri-arrow-up-line', 'bg-info');
    relHtml += relTable(d.relationships.children,
        t({pt:'Tabelas-filha (FK de saída)', en:'Child Tables (Outgoing FK)', es:'Tablas hijo (FK de salida)'}),
        'ri-arrow-down-line', 'bg-success');

    document.getElementById('tab-relationships').innerHTML = relHtml;

    // Tab 4: SQL
    var sqlHtml = '';
    d.sql.forEach(function(q) {
        sqlHtml += '<div class="sql-block"><div class="sql-header"><i class="ri-code-s-slash-line"></i> ' + t(q.title) + '</div><pre class="sql-code">' + q.code + '</pre></div>';
    });
    if (d.filters && d.filters.length) {
        sqlHtml += '<div class="card"><div class="card-header"><div class="card-header-icon bg-warning"><i class="ri-filter-line"></i></div><div class="card-title">' + t({pt:'Filtros comuns', en:'Common Filters', es:'Filtros comunes'}) + '</div></div><div class="card-body"><ul class="filter-list">';
        d.filters.forEach(function(f) {
            sqlHtml += '<li><code>' + f.code + '</code> <span>' + t(f.desc) + '</span></li>';
        });
        sqlHtml += '</ul></div></div>';
    }
    document.getElementById('tab-sql').innerHTML = sqlHtml;

    // Tab 5: Related PVOs (grouped by PVO, table inside each group)
    var pvosHtml = '';
    if (d.related_pvos && d.related_pvos.length) {
        // Group rows by pvo_name
        var pvoGroups = {};
        var pvoOrder = [];
        d.related_pvos.forEach(function(row) {
            var key = row.pvo_name;
            if (!pvoGroups[key]) {
                pvoGroups[key] = { pvo_name: row.pvo_name, module_code: row.module_code, rows: [] };
                pvoOrder.push(key);
            }
            pvoGroups[key].rows.push(row);
        });

        pvosHtml += '<div class="search-container"><i class="ri-search-line search-icon"></i><input class="search-input" type="text" placeholder="' + t({pt:'Filtrar PVOs...', en:'Filter PVOs...', es:'Filtrar PVOs...'}) + '" oninput="filterPvos(this.value)"></div>';

        var pvoHeaders = {
            pt: ['#','Campo da Tabela','Campo do PVO','Disponível por BICC'],
            en: ['#','Table Column','PVO Attribute','Available via BICC'],
            es: ['#','Campo de Tabla','Campo del PVO','Disponible por BICC']
        };
        var ph = pvoHeaders[currentLang] || pvoHeaders['pt'];

        pvosHtml += '<div id="pvos-groups">';
        pvoOrder.forEach(function(key) {
            var grp = pvoGroups[key];
            var pvoFile = grp.pvo_name.toLowerCase() + '.html';
            var pvoHref = (grp.module_code === m.module_code)
                ? '../pvos/' + pvoFile
                : '../../' + grp.module_code + '/pvos/' + pvoFile;
            var biccCount = grp.rows.filter(function(r) { return r.bicc; }).length;

            var grpSearchFields = grp.rows.map(function(r) { return r.column + ' ' + r.pvo_attr; }).join(' ');
            pvosHtml += '<div class="card pvo-group" data-search="' + (grp.pvo_name + ' ' + grp.module_code + ' ' + grpSearchFields).toLowerCase() + '">' +
                '<div class="card-header" style="cursor:pointer" onclick="this.parentElement.classList.toggle(\'collapsed\')">' +
                '<div class="card-header-icon bg-purple"><i class="ri-database-2-line"></i></div>' +
                '<div class="card-title"><a href="' + pvoHref + langParam() + '" class="wikilink" onclick="event.stopPropagation()">' + grp.pvo_name + '</a></div>' +
                '<span class="pill pill-info">' + grp.module_code + '</span>' +
                '<span class="card-badge pill-info" style="background:var(--info-light);color:var(--pill-info-text);border:1px solid var(--info-border)">' + grp.rows.length + ' attrs</span>' +
                (biccCount ? '<span class="card-badge pill-success" style="background:var(--success-light);color:var(--pill-success-text);border:1px solid var(--success-border)">BICC ' + biccCount + '</span>' : '') +
                '<i class="ri-arrow-down-s-line" style="font-size:1.2rem;color:var(--text-muted);margin-left:auto;transition:transform 0.2s"></i>' +
                '</div>' +
                '<div class="card-body pvo-group-body"><div class="table-wrapper"><table><thead><tr>';
            ph.forEach(function(h, i) { pvosHtml += '<th' + (i === ph.length - 1 ? ' style="text-align:center"' : '') + '>' + h + '</th>'; });
            pvosHtml += '</tr></thead><tbody>';
            grp.rows.forEach(function(row, idx) {
                var biccHtml = row.bicc
                    ? '<span class="pill pill-success"><i class="ri-checkbox-circle-fill"></i> ' + t({pt:'Sim',en:'Yes',es:'Sí'}) + '</span>'
                    : '<span class="pill pill-danger" style="opacity:0.5">' + t({pt:'Não',en:'No',es:'No'}) + '</span>';
                pvosHtml += '<tr>' +
                    '<td>' + (idx + 1) + '</td>' +
                    '<td class="col-name">' + row.column + '</td>' +
                    '<td class="col-name">' + row.pvo_attr + '</td>' +
                    '<td style="text-align:center">' + biccHtml + '</td>' +
                    '</tr>';
            });
            pvosHtml += '</tbody></table></div></div></div>';
        });
        pvosHtml += '</div>';
    }
    document.getElementById('tab-pvos').innerHTML = pvosHtml;

    // Footer
    document.getElementById('f-initials').textContent = m.author_initials || '';
    document.getElementById('f-name').textContent = m.author_name || '';
    document.getElementById('f-role').textContent = m.author_role || '';
    var email = m.author_email || '';
    document.getElementById('f-email').innerHTML = email ? '<a href="mailto:' + email + '">' + email + '</a>' : '';
    document.getElementById('f-doc-title').textContent = (m.company || '') + ' · ' + m.id;
    document.getElementById('f-doc-detail').textContent = m.table_name + ' · ' + m.module;
    document.getElementById('f-seal').innerHTML = '<i class="ri-shield-check-line"></i> ' + t({pt:'Criado por', en:'Created by', es:'Creado por'}) + ' ' + (m.author_name || '') + ' · ' + (m.area || '');

    // Breadcrumb (always in English)
    var modCode = m.module_code || '';
    var modName = m.module || '';
    document.getElementById('breadcrumb').innerHTML =
        '<a href="../../../index.html">Oracle Fusion Data Dictionary</a><span class="sep">›</span>' +
        '<a href="../index.html">' + modCode + ' - ' + modName + '</a><span class="sep">›</span>' +
        '<span class="current">' + m.table_name + '</span>';

    // Convert [[wikilinks]] in all rendered content
    convertWikilinks();
}

/* ====== WIKILINK CONVERTER ====== */
function convertWikilinks() {
    // Find all [[table_name]] in rendered HTML and convert to <a> links
    var containers = document.querySelectorAll('.tab-content, .intro-text, .note-item, .card-body');
    var re = /\[\[([^\]]+)\]\]/g;
    containers.forEach(function(el) {
        if (!re.test(el.innerHTML)) return;
        el.innerHTML = el.innerHTML.replace(re, function(match, name) {
            var link = resolveLink(name, DATA.meta.module_code || '');
            if (link.cls === 'broken-link') {
                return '<span class="broken-link" title="Link not found">' + name + '</span>';
            }
            return '<a href="' + link.href + langParam() + '" class="wikilink">' + name + '</a>';
        });
    });
}

/* ====== COLUMN FILTER ====== */
function filterColumns(query) {
    var q = query.toLowerCase().trim();
    var rows = document.querySelectorAll('#columns-table tbody tr');
    rows.forEach(function(row) {
        var text = row.getAttribute('data-search') || '';
        row.style.display = !q || text.indexOf(q) >= 0 ? '' : 'none';
    });
}

/* ====== PVO FILTER ====== */
function filterPvos(query) {
    var q = query.toLowerCase().trim();
    var groups = document.querySelectorAll('#pvos-groups .pvo-group');
    groups.forEach(function(grp) {
        var text = grp.getAttribute('data-search') || '';
        grp.style.display = !q || text.indexOf(q) >= 0 ? '' : 'none';
    });
}

/* ====== INIT ====== */
(function() {
    var savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') {
        document.body.setAttribute('data-theme', 'light');
        document.getElementById('theme-icon').className = 'ri-moon-line';
    }

    // Render first in PT (default)
    render();

    // Then switch lang if URL param or localStorage says so
    var urlLang = new URLSearchParams(window.location.search).get('lang');
    var targetLang = urlLang || localStorage.getItem('preferred-lang');
    if (targetLang && targetLang !== 'pt') {
        switchLang(targetLang);
    }

    // Back to top
    var btn = document.getElementById('backToTop');
    window.addEventListener('scroll', function() {
        btn.classList.toggle('visible', window.scrollY > 300);
    });
})();
</script>
